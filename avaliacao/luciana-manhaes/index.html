<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliação Física — Alessandro Bacellar | MaxResults</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#08080a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a; --surface: #111114; --surface-2: #19191d; --surface-3: #222226;
      --border: rgba(255,255,255,0.06); --border-light: rgba(255,255,255,0.1);
      --text: #ededef; --text-dim: #b0b0b6; --text-muted: #6b6b73;
      --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.1); --amber-glow: rgba(245,158,11,0.3);
      --green: #34d399; --green-dim: rgba(52,211,153,0.1);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --radius: 16px; --radius-sm: 10px;
      --font-display: 'Outfit', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; -webkit-font-smoothing: antialiased; padding-bottom: 40px; }
    body::before { content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 600px; height: 320px; background: radial-gradient(ellipse, rgba(245,158,11,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .container { max-width: 560px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }

    /* Header */
    .head-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 20px; margin-bottom: 14px; text-align: center; }
    .brand { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: 1px; }
    .brand .dot { color: var(--amber); }
    .brand-sub { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }
    .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: left; }
    .id-item { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 14px; }
    .id-item.full { grid-column: 1 / -1; }
    .id-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
    .id-value { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text); margin-top: 2px; }

    /* Section */
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 18px 20px; margin-bottom: 14px; }
    .section-title { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--amber); margin-bottom: 14px; }
    .section-title .unit { margin-left: auto; font-size: 9px; letter-spacing: 1px; color: var(--text-muted); }

    /* Basic values (altura/peso) */
    .basics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .basic { background: var(--surface-2); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
    .basic .bv { font-family: var(--font-display); font-size: 24px; font-weight: 800; }
    .basic .bl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-top: 3px; }

    /* Perimetria tronco grid */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .cell { background: var(--surface-2); border-radius: var(--radius-sm); padding: 11px 12px; }
    .cell .cl { font-size: 9px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-muted); }
    .cell .cv { font-family: var(--font-display); font-size: 17px; font-weight: 700; margin-top: 2px; }
    .cell .cv .u { font-size: 10px; color: var(--text-muted); font-weight: 600; }

    /* Membros bilateral */
    .limb { display: grid; grid-template-columns: 1.1fr 1fr 1fr auto; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .limb:last-child { border-bottom: none; }
    .limb-name { font-size: 12px; color: var(--text-dim); font-weight: 500; }
    .limb-side { background: var(--surface-2); border-radius: 8px; padding: 8px; text-align: center; }
    .limb-side .ls-tag { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); }
    .limb-side .ls-val { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-top: 1px; }
    .limb-diff { font-family: var(--font-display); font-size: 12px; font-weight: 700; text-align: right; min-width: 44px; }
    .limb-diff.ok { color: var(--text-muted); }
    .limb-diff.warn { color: var(--amber); }
    .limb-note { font-size: 11px; color: var(--text-muted); margin-top: 12px; display: flex; gap: 6px; align-items: flex-start; }

    /* Composição */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 18px; }
    .donut { position: relative; width: 176px; height: 176px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .donut::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(var(--amber) 0% var(--fat-pct), #2a2a30 var(--fat-pct) 100%); }
    .donut::after { content: ''; position: absolute; inset: 26px; border-radius: 50%; background: var(--surface); }
    .donut-inner { position: relative; z-index: 1; text-align: center; }
    .donut-inner .dp { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--amber); }
    .donut-inner .dl { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .donut-side { margin-top: 14px; display: flex; gap: 24px; }
    .donut-side .ds { text-align: center; }
    .donut-side .ds-v { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
    .donut-side .ds-l { font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
    .donut-side .ds.fat .ds-v { color: var(--amber); }
    .donut-side .ds.lean .ds-v { color: var(--green); }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
    .stat { background: var(--surface-2); border-radius: var(--radius-sm); padding: 13px 14px; }
    .stat .st-l { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
    .stat .st-v { font-family: var(--font-display); font-size: 22px; font-weight: 800; margin-top: 3px; }
    .stat .st-v .u { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .stat .st-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 3px; }
    .st-tag.green { color: var(--green); } .st-tag.amber { color: var(--amber); } .st-tag.red { color: var(--red); }

    /* Ponto de partida (1ª avaliação) */
    .baseline { margin-top: 14px; background: linear-gradient(165deg, rgba(245,158,11,0.09), var(--surface) 60%); border: 1px solid var(--amber-glow); border-radius: var(--radius); padding: 26px 22px; text-align: center; position: relative; overflow: hidden; }
    .baseline::before { content:''; position:absolute; top:-50px; left:50%; transform:translateX(-50%); width:240px; height:140px; background:radial-gradient(ellipse, rgba(245,158,11,0.2), transparent 70%); pointer-events:none; }
    .baseline-badge { position:relative; display:inline-flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:800; font-size:14px; letter-spacing:0.4px; color:#08080a; background:linear-gradient(135deg,#fcd34d,var(--amber)); padding:12px 22px; border-radius:999px; box-shadow:0 6px 20px rgba(245,158,11,0.4); }
    .baseline-title { position:relative; font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--text); margin-top:16px; }
    .baseline-text { position:relative; font-size:12.5px; color:var(--text-dim); line-height:1.65; margin-top:8px; max-width:380px; margin:8px auto 0; }
    .baseline-text b { color:var(--amber); font-weight:700; }
    .baseline-next { position:relative; display:inline-block; margin-top:16px; font-size:11px; font-weight:600; letter-spacing:0.3px; color:var(--text-muted); background:var(--surface-2); border:1px solid var(--border); border-radius:999px; padding:7px 16px; }

    /* Evolução (2+ avaliações) */
    .evo { margin-top: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 18px 20px; }
    .evo-head { display:flex; align-items:center; gap:8px; font-family:var(--font-display); font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
    .evo-period { font-size:11px; color:var(--text-muted); margin-bottom:14px; }
    .evo-hi { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
    .evo-hi-item { background:var(--surface-2); border-radius:var(--radius-sm); padding:14px 10px; text-align:center; }
    .evo-hi-val { font-family:var(--font-display); font-size:20px; font-weight:800; }
    .evo-hi-val.green { color:var(--green); } .evo-hi-val.red { color:var(--red); } .evo-hi-val.flat { color:var(--text-dim); }
    .evo-hi-lbl { font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted); margin-top:4px; }
    .evo-row { display:grid; grid-template-columns:1.1fr 1fr 1fr auto; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); font-size:12px; }
    .evo-row:last-child { border-bottom:none; }
    .evo-lbl { color:var(--text-dim); }
    .evo-old { color:var(--text-muted); font-family:var(--font-display); font-weight:600; text-align:center; }
    .evo-new { color:var(--text); font-family:var(--font-display); font-weight:700; text-align:center; }
    .evo-delta { font-family:var(--font-display); font-weight:700; font-size:12px; text-align:right; min-width:52px; }
    .evo-delta.green { color:var(--green); } .evo-delta.red { color:var(--red); } .evo-delta.flat { color:var(--text-muted); }
    .evo-colhead { display:grid; grid-template-columns:1.1fr 1fr 1fr auto; gap:8px; font-size:8.5px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); padding-bottom:6px; }
    .evo-colhead span:nth-child(2),.evo-colhead span:nth-child(3){ text-align:center; } .evo-colhead span:last-child{ text-align:right; }

    .footer { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; line-height: 1.7; }
    .footer .fb { color: var(--amber); font-weight: 700; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   MAXRESULTS · AVALIAÇÃO FÍSICA — TEMPLATE
   Para uma nova avaliação: copie esta pasta, troque só o objeto DATA
   abaixo (medidas cruas). A página calcula composição, IMC, RCQ, TMB
   e classificações sozinha (Pollock 7 + Siri + Mifflin-St Jeor).
   ═══════════════════════════════════════════════════════════════ */
const DATA = {
  nome: "Luciana Manhães",
  data: "05/06/2026",
  proxima: "05/09/2026",           // +3 meses
  sexo: "F",                       // CORRIGIDO (PDF veio "Masculino" por erro)
  idade: 44,
  altura: 169.0,                   // cm
  peso: 66.85,                     // kg
  tronco: { pescoco: null, ombro: 103.0, peitoral: 83.0, cintura: 69.0, abdomen: 83.0, quadril: 101.5 },
  membros: {
    "Braço relaxado": { e: 29.5, d: 29.0 },   // rotulado "contraído" no PDF; é o relaxado
    "Antebraço":      null,
    "Coxa proximal":  { e: 60.0, d: 60.0 },
    "Panturrilha":    { e: 41.0, d: 41.0 },
  },
  dobras: { Tricipital: 16.3, Subescapular: 10.1, Peitoral: 4.0, "Axilar méd.": 5.6, "Suprailíaca": 7.8, Abdominal: 13.1, Coxa: 27.4 },
  obs: "",
  // Avaliações ANTERIORES (mesmo formato: {data, sexo, idade, altura, peso, tronco, dobras}).
  // Vazio = primeira avaliação → mostra o marcador "Ponto de Partida".
  // Com 1+ → mostra a EVOLUÇÃO (antes/depois) comparando a mais recente com esta.
  historico: [],
};

/* ── Cálculos (validados contra o app oficial, batem no decimal) ── */
function calc(d) {
  const s7 = Object.values(d.dobras).reduce((a,b)=>a+b, 0);
  const age = d.idade, h = d.altura/100;
  let bd;
  if (d.sexo === "F")
    bd = 1.0970 - 0.00046971*s7 + 0.00000056*s7*s7 - 0.00012828*age;   // Jackson/Pollock/Ward mulheres
  else
    bd = 1.112 - 0.00043499*s7 + 0.00000055*s7*s7 - 0.00028826*age;    // Jackson/Pollock homens
  const fat = 495/bd - 450;                                            // Siri
  const fatMass = d.peso * fat/100;
  const leanMass = d.peso - fatMass;
  const imc = d.peso / (h*h);
  const rcq = d.tronco.cintura && d.tronco.quadril ? d.tronco.cintura/d.tronco.quadril : null;
  const tmb = d.sexo === "F"
    ? 10*d.peso + 6.25*d.altura - 5*age - 161
    : 10*d.peso + 6.25*d.altura - 5*age + 5;                           // Mifflin-St Jeor
  const idealMin = 18.5*h*h, idealMax = 24.9*h*h;
  return { s7, fat, fatMass, leanMass, imc, rcq, tmb, idealMin, idealMax };
}
function fatClass(pct, sexo) {
  const bands = sexo === "F"
    ? [[13,"Baixa","amber"],[20,"Atlético","green"],[24,"Bom","green"],[31,"Aceitável","amber"],[999,"Elevado","red"]]
    : [[5,"Baixa","amber"],[13,"Atlético","green"],[17,"Bom","green"],[24,"Aceitável","amber"],[999,"Elevado","red"]];
  for (const [max,label,color] of bands) if (pct <= max) return {label,color};
}
function imcClass(v) {
  if (v < 18.5) return {label:"Abaixo",color:"amber"};
  if (v < 25)   return {label:"Normal",color:"green"};
  if (v < 30)   return {label:"Sobrepeso",color:"amber"};
  return {label:"Obesidade",color:"red"};
}
function rcqClass(v, sexo) {
  if (v == null) return {label:"",color:""};
  const lim = sexo === "F" ? [0.80,0.85,0.90] : [0.90,0.95,1.00];
  if (v < lim[0]) return {label:"Baixo risco",color:"green"};
  if (v < lim[1]) return {label:"Risco moderado",color:"amber"};
  if (v < lim[2]) return {label:"Risco alto",color:"amber"};
  return {label:"Risco muito alto",color:"red"};
}
const nf = (v,dp=1) => v.toLocaleString('pt-BR',{minimumFractionDigits:dp,maximumFractionDigits:dp});
const thousand = v => Math.round(v).toLocaleString('pt-BR');

/* ── Evolução entre avaliações ── */
function evoDelta(oldV, newV, lowerIsBetter, unit, dp=1) {
  const d = newV - oldV;
  const flat = Math.abs(d) < 0.05;
  const improved = lowerIsBetter ? d < 0 : d > 0;
  const cls = flat ? 'flat' : (improved ? 'green' : 'red');
  const arrow = flat ? '→' : (d < 0 ? '↓' : '↑');
  const sign = d > 0 ? '+' : (d < 0 ? '−' : '');
  return `<span class="evo-delta ${cls}">${arrow} ${sign}${nf(Math.abs(d),dp)}${unit}</span>`;
}
function renderEvolution(d, cur) {
  const prev = d.historico[d.historico.length - 1];
  const p = calc(prev);
  const hiCls = v => Math.abs(v) < 0.05 ? 'flat' : (v > 0 ? 'green' : 'red');
  const fatLost = p.fatMass - cur.fatMass;                 // + = perdeu gordura (bom)
  const leanGain = cur.leanMass - p.leanMass;              // + = ganhou magra (bom)
  const rows = [
    ['% Gordura', p.fat, cur.fat, true, '%'],
    ['Massa Magra', p.leanMass, cur.leanMass, false, ' kg'],
    ['Massa Gorda', p.fatMass, cur.fatMass, true, ' kg'],
    ['Σ Dobras', p.s7, cur.s7, true, ' mm'],
  ];
  const pt = prev.tronco, ct = d.tronco;
  [['Cintura','cintura'],['Abdômen','abdomen'],['Quadril','quadril']].forEach(([lbl,k]) => {
    if (pt[k] != null && ct[k] != null) rows.push([lbl, pt[k], ct[k], true, ' cm']);
  });
  const rowsHtml = rows.map(([lbl,o,n,low,u]) =>
    `<div class="evo-row"><span class="evo-lbl">${lbl}</span><span class="evo-old">${nf(o,u===' mm'||u==='%'?1:1)}${u}</span><span class="evo-new">${nf(n,1)}${u}</span>${evoDelta(o,n,low,u)}</div>`
  ).join('');
  return `
    <div class="evo">
      <div class="evo-head">📈 Evolução</div>
      <div class="evo-period">${prev.data} → ${d.data}</div>
      <div class="evo-hi">
        <div class="evo-hi-item"><div class="evo-hi-val ${hiCls(fatLost)}">${fatLost>=0?'−':'+'}${nf(Math.abs(fatLost))}</div><div class="evo-hi-lbl">kg gordura</div></div>
        <div class="evo-hi-item"><div class="evo-hi-val ${hiCls(leanGain)}">${leanGain>=0?'+':'−'}${nf(Math.abs(leanGain))}</div><div class="evo-hi-lbl">kg massa magra</div></div>
        <div class="evo-hi-item"><div class="evo-hi-val ${hiCls(p.fat-cur.fat)}">${(cur.fat-p.fat)>=0?'+':'−'}${nf(Math.abs(cur.fat-p.fat))}</div><div class="evo-hi-lbl">% gordura</div></div>
      </div>
      <div class="evo-colhead"><span>Medida</span><span>Antes</span><span>Agora</span><span>Δ</span></div>
      ${rowsHtml}
    </div>`;
}

/* ── Render ── */
function render(d) {
  const r = calc(d);
  const fc = fatClass(r.fat, d.sexo), ic = imcClass(r.imc), rc = rcqClass(r.rcq, d.sexo);
  const sexoLabel = d.sexo === "F" ? "Feminino" : "Masculino";

  const troncoLabels = { pescoco:"Pescoço", ombro:"Ombro", peitoral:"Peitoral", cintura:"Cintura", abdomen:"Abdômen", quadril:"Quadril" };
  const troncoCells = Object.entries(d.tronco).filter(([k,v])=>v!=null)
    .map(([k,v])=>`<div class="cell"><div class="cl">${troncoLabels[k]}</div><div class="cv">${nf(v)}<span class="u"> cm</span></div></div>`).join('');

  const membroRows = Object.entries(d.membros).map(([name,m])=>{
    if (!m) return `<div class="limb"><span class="limb-name">${name}</span><div class="limb-side" style="grid-column:2/4;color:var(--text-muted);font-size:11px;padding:8px;">não medido</div><span></span></div>`;
    const diff = m.d - m.e, adiff = Math.abs(diff);
    const cls = adiff > 1 ? 'warn' : 'ok';
    const sign = diff>0?'+':(diff<0?'−':'');
    return `<div class="limb">
      <span class="limb-name">${name}</span>
      <div class="limb-side"><div class="ls-tag">ESQ</div><div class="ls-val">${nf(m.e)}</div></div>
      <div class="limb-side"><div class="ls-tag">DIR</div><div class="ls-val">${nf(m.d)}</div></div>
      <span class="limb-diff ${cls}">${diff===0?'0.0':sign+nf(adiff)}</span>
    </div>`;
  }).join('');

  const dobraCells = Object.entries(d.dobras)
    .map(([k,v])=>`<div class="cell"><div class="cl">${k}</div><div class="cv">${nf(v)}<span class="u"> mm</span></div></div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="head-card">
      <div class="brand">MaxRe<span class="dot">.</span>sults</div>
      <div class="brand-sub">Avaliação Física</div>
      <div class="id-grid">
        <div class="id-item full"><div class="id-label">Nome do Aluno</div><div class="id-value">${d.nome}</div></div>
        <div class="id-item"><div class="id-label">Data</div><div class="id-value">${d.data}</div></div>
        <div class="id-item"><div class="id-label">Próxima Avaliação</div><div class="id-value">${d.proxima}</div></div>
        <div class="id-item"><div class="id-label">Gênero</div><div class="id-value">${sexoLabel}</div></div>
        <div class="id-item"><div class="id-label">Idade</div><div class="id-value">${d.idade} anos</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📏 Dados Básicos</div>
      <div class="basics">
        <div class="basic"><div class="bv">${nf(d.altura)}<span class="u"></span></div><div class="bl">Altura · cm</div></div>
        <div class="basic"><div class="bv">${nf(d.peso,2)}</div><div class="bl">Peso · kg</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📐 Perimetria · Tronco <span class="unit">cm</span></div>
      <div class="grid3">${troncoCells}</div>
    </div>

    <div class="section">
      <div class="section-title">💪 Perimetria · Membros <span class="unit">cm · esq / dir</span></div>
      ${membroRows}
      <div class="limb-note">💡 <span>Diferenças &gt; 1 cm entre os lados podem indicar assimetria — atenção no treino.</span></div>
    </div>

    <div class="section">
      <div class="section-title">🤏 Dobras Cutâneas · Pollock 7 <span class="unit">mm</span></div>
      <div class="grid3">${dobraCells}</div>
    </div>

    <div class="section">
      <div class="section-title">📊 Composição Corporal</div>
      <div class="donut-wrap">
        <div class="donut" style="--fat-pct:${r.fat.toFixed(1)}%">
          <div class="donut-inner"><div class="dp">${nf(r.fat)}%</div><div class="dl">Gordura</div></div>
        </div>
        <div class="donut-side">
          <div class="ds fat"><div class="ds-v">${nf(r.fatMass)} kg</div><div class="ds-l">Massa Gorda</div></div>
          <div class="ds lean"><div class="ds-v">${nf(r.leanMass)} kg</div><div class="ds-l">Massa Magra</div></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="st-l">IMC</div><div class="st-v">${nf(r.imc)}</div><div class="st-tag ${ic.color}">${ic.label}</div></div>
        <div class="stat"><div class="st-l">% Gordura</div><div class="st-v">${nf(r.fat)}<span class="u">%</span></div><div class="st-tag ${fc.color}">${fc.label}</div></div>
        <div class="stat"><div class="st-l">RCQ (cint/quad)</div><div class="st-v">${r.rcq?nf(r.rcq,2):'—'}</div><div class="st-tag ${rc.color}">${rc.label}</div></div>
        <div class="stat"><div class="st-l">Σ Dobras</div><div class="st-v">${nf(r.s7)}<span class="u"> mm</span></div><div class="st-tag" style="color:var(--text-muted)">7/7 preenchidas</div></div>
        <div class="stat"><div class="st-l">Peso Ideal</div><div class="st-v" style="font-size:18px">${nf(r.idealMin)}–${nf(r.idealMax)}</div><div class="st-tag" style="color:var(--text-muted)">kg · IMC saudável</div></div>
        <div class="stat"><div class="st-l">TMB (basal)</div><div class="st-v">${thousand(r.tmb)}</div><div class="st-tag" style="color:var(--text-muted)">kcal/dia</div></div>
      </div>
      ${d.obs ? `<div class="limb-note" style="margin-top:16px">📝 <span>${d.obs}</span></div>` : ''}
    </div>

    ${(d.historico && d.historico.length >= 1) ? renderEvolution(d, r) : `
    <div class="baseline">
      <div class="baseline-badge">📍 Primeira Avaliação Física</div>
      <div class="baseline-title">Seu ponto de partida</div>
      <div class="baseline-text">Esta é a sua <b>avaliação de referência</b>. A partir da próxima, você vê aqui a sua <b>evolução</b> — gordura, medidas e massa magra — lado a lado. 📈</div>
      <div class="baseline-next">Próxima avaliação sugerida · ${d.proxima}</div>
    </div>`}

    <div class="footer">
      <span class="fb">MaxResults</span> · Avaliação Física<br>
      Luisão Ribeiro · CREF 040847-G/PR
    </div>
  `;
}
render(DATA);
</script>
</body>
</html>
